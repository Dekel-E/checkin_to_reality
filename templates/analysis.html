<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Analysis Dashboard - Check-in to Reality</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Header -->
    <div class="dashboard-header">
        <div class="header-content">
            <h1 class="header-title">
                <i class="fas fa-chart-line"></i>
                Hotel Complaint & Praise Analysis
            </h1>
            <p class="header-subtitle">Deep dive into guest feedback patterns and sentiment analysis</p>
            <div class="nav-links">
                <a href="/" class="nav-link-btn">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/dashboard" class="nav-link-btn">
                    <i class="fas fa-map"></i> Map Dashboard
                </a>
                <a href="/hotels" class="nav-link-btn">
                    <i class="fas fa-list"></i> Hotels List
                </a>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-section">
        <div class="controls-container">
            <div class="control-group">
                <label class="control-label">City:</label>
                <select id="city-select">
                    <option value="">All Cities</option>
                </select>
            </div>
            <div class="control-group">
                <label class="control-label">Hotel:</label>
                <select id="hotel-select">
                    <option value="">Select a hotel...</option>
                </select>
            </div>
            <button class="btn-refresh" onclick="loadAnalysis()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-content">
        <div id="content-area">
            <div class="empty-state">
                <i class="fas fa-chart-pie"></i>
                <h3>Select a hotel to view analysis</h3>
                <p>Choose a city and hotel from the dropdowns above to see detailed complaint and praise patterns</p>
            </div>
        </div>
    </div>

    <script>
        let allHotels = [];
        let selectedHotel = null;
        let complaintChart = null;
        let praiseChart = null;

        // Load cities on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCities();
            await loadAllHotels();
        });

        // Load cities
        async function loadCities() {
            try {
                const response = await fetch('/api/cities');
                const cities = await response.json();

                const select = document.getElementById('city-select');
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading cities:', error);
            }
        }

        // Load all hotels
        async function loadAllHotels() {
            try {
                const response = await fetch('/api/hotels/filtered', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                allHotels = await response.json();
            } catch (error) {
                console.error('Error loading hotels:', error);
            }
        }

        // Filter hotels by city
        document.getElementById('city-select').addEventListener('change', function() {
            const city = this.value;
            const hotelSelect = document.getElementById('hotel-select');

            // Clear hotel select
            hotelSelect.innerHTML = '<option value="">Select a hotel...</option>';

            // Filter hotels by city
            const cityHotels = city ? allHotels.filter(h => h.city === city) : allHotels;

            // Populate hotel select
            cityHotels.forEach(hotel => {
                const option = document.createElement('option');
                option.value = hotel.hotel_id;
                option.textContent = hotel.title;
                option.dataset.hotel = JSON.stringify(hotel);
                hotelSelect.appendChild(option);
            });
        });

        // Load analysis when hotel is selected
        document.getElementById('hotel-select').addEventListener('change', function() {
            const selected = this.selectedOptions[0];
            if (selected && selected.value) {
                selectedHotel = JSON.parse(selected.dataset.hotel);
                loadAnalysis();
            }
        });

        // Load and display analysis
        function loadAnalysis() {
            if (!selectedHotel) {
                document.getElementById('content-area').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chart-pie"></i>
                        <h3>Select a hotel to view analysis</h3>
                        <p>Choose a city and hotel from the dropdowns above to see detailed complaint and praise patterns</p>
                    </div>
                `;
                return;
            }

            const contentArea = document.getElementById('content-area');

            // Calculate gap score for indicator
            const gapScore = parseFloat(selectedHotel.gap_score) || 0;
            const numberOfReviews = parseInt(selectedHotel.number_of_reviews) || 0;

            // Add caution tag if low reviews
            const lowReviewCaution = numberOfReviews < 5 ?
                `<div class="review-caution">
                    <i class="fas fa-exclamation-triangle"></i>
                    Caution - Low Review Data (${numberOfReviews} reviews)
                </div>` : '';

            // Create hotel info card
            const hotelInfoHTML = `
                <div class="analysis-card hotel-info-card">
                    <h2 class="hotel-name">${selectedHotel.title}</h2>
                    <div class="hotel-details">
                        <div class="detail-item">
                            <i class="fas fa-map-marker-alt" style="color: var(--danger-color);"></i>
                            <span class="detail-label">Location:</span>
                            <span class="detail-value">${selectedHotel.city}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-star" style="color: var(--warning-color);"></i>
                            <span class="detail-label">Review Score:</span>
                            <span class="detail-value">${selectedHotel.review_score || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-chart-line" style="color: var(--info-color);"></i>
                            <span class="detail-label">Reality Score:</span>
                            <span class="detail-value">${selectedHotel.predicted_reality_score || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-exclamation-triangle" style="color: var(--danger-color);"></i>
                            <span class="detail-label">Gap Category:</span>
                            <span class="detail-value">${selectedHotel.gap_category || 'N/A'}</span>
                        </div>
                    </div>

                    ${lowReviewCaution}

                    <!-- Visual Gap Indicator -->
                    <div class="gap-indicator-visual" style="margin-top: 20px;">
                        <div class="gap-indicator-track">
                            <div class="gap-indicator-pointer" style="left: ${gapScore}%" data-gap="${gapScore.toFixed(0)}% gap"></div>
                        </div>
                        <div class="gap-indicator-labels">
                            <span>Better than expected</span>
                            <span>Worse than expected</span>
                        </div>
                    </div>
                </div>
            `;

            // Calculate scores
            const complaintTotal = parseFloat(selectedHotel.complaint_noise || 0) +
                                  parseFloat(selectedHotel.complaint_cleanliness || 0) +
                                  parseFloat(selectedHotel.complaint_location || 0) +
                                  parseFloat(selectedHotel.complaint_amenities || 0) +
                                  parseFloat(selectedHotel.complaint_host || 0) +
                                  parseFloat(selectedHotel.complaint_value || 0);

            const praiseTotal = parseFloat(selectedHotel.praise_quiet || 0) +
                               parseFloat(selectedHotel.praise_clean || 0) +
                               parseFloat(selectedHotel.praise_location || 0) +
                               parseFloat(selectedHotel.praise_amenities || 0) +
                               parseFloat(selectedHotel.praise_host || 0) +
                               parseFloat(selectedHotel.praise_value || 0);

            const overallSentiment = ((praiseTotal - complaintTotal) / (praiseTotal + complaintTotal + 1) * 100).toFixed(1);

            // Create score cards
            const scoreCardsHTML = `
                <div class="scores-grid">
                    <div class="score-card">
                        <div class="score-icon complaints">
                            <i class="fas fa-thumbs-down"></i>
                        </div>
                        <div class="score-value" style="color: var(--danger-color);">${complaintTotal.toFixed(0)}</div>
                        <div class="score-label">Total Complaints</div>
                    </div>
                    <div class="score-card">
                        <div class="score-icon praises">
                            <i class="fas fa-thumbs-up"></i>
                        </div>
                        <div class="score-value" style="color: var(--success-color);">${praiseTotal.toFixed(0)}</div>
                        <div class="score-label">Total Praises</div>
                    </div>
                    <div class="score-card">
                        <div class="score-icon overall">
                            <i class="fas fa-balance-scale"></i>
                        </div>
                        <div class="score-value" style="color: var(--info-color);">${overallSentiment}%</div>
                        <div class="score-label">Overall Sentiment</div>
                    </div>
                </div>
            `;

            // Create charts section
            const chartsHTML = `
                <div class="charts-grid">
                    <div class="analysis-card">
                        <h3 class="card-title">
                            <i class="fas fa-thumbs-down"></i>
                            Complaint Breakdown
                        </h3>
                        <canvas id="complaintChart"></canvas>
                    </div>
                    <div class="analysis-card">
                        <h3 class="card-title">
                            <i class="fas fa-thumbs-up"></i>
                            Praise Breakdown
                        </h3>
                        <canvas id="praiseChart"></canvas>
                    </div>
                </div>
            `;

            // Create detailed metrics
            const metricsHTML = `
                <div class="analysis-card">
                    <h3 class="card-title">
                        <i class="fas fa-chart-bar"></i>
                        Detailed Metrics Comparison
                    </h3>
                    ${createMetricBars()}
                </div>
            `;

            // Update content area
            contentArea.innerHTML = hotelInfoHTML + scoreCardsHTML + chartsHTML + metricsHTML;

            // Create charts
            createRadarCharts();
        }

        // Create metric bars
        function createMetricBars() {
            const metrics = [
                { name: 'Noise Complaints', value: parseFloat(selectedHotel.complaint_noise || 0), type: 'complaint' },
                { name: 'Quiet Praise', value: parseFloat(selectedHotel.praise_quiet || 0), type: 'praise' },
                { name: 'Cleanliness Complaints', value: parseFloat(selectedHotel.complaint_cleanliness || 0), type: 'complaint' },
                { name: 'Clean Praise', value: parseFloat(selectedHotel.praise_clean || 0), type: 'praise' },
                { name: 'Location Complaints', value: parseFloat(selectedHotel.complaint_location || 0), type: 'complaint' },
                { name: 'Location Praise', value: parseFloat(selectedHotel.praise_location || 0), type: 'praise' },
                { name: 'Amenities Complaints', value: parseFloat(selectedHotel.complaint_amenities || 0), type: 'complaint' },
                { name: 'Amenities Praise', value: parseFloat(selectedHotel.praise_amenities || 0), type: 'praise' },
                { name: 'Host Complaints', value: parseFloat(selectedHotel.complaint_host || 0), type: 'complaint' },
                { name: 'Host Praise', value: parseFloat(selectedHotel.praise_host || 0), type: 'praise' },
                { name: 'Value Complaints', value: parseFloat(selectedHotel.complaint_value || 0), type: 'complaint' },
                { name: 'Value Praise', value: parseFloat(selectedHotel.praise_value || 0), type: 'praise' }
            ];

            const maxValue = Math.max(...metrics.map(m => m.value), 1);

            return metrics.map(metric => `
                <div class="metric-item">
                    <div class="metric-header">
                        <span class="metric-name">${metric.name}</span>
                        <span class="metric-value">${metric.value.toFixed(1)}</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar ${metric.type}" style="width: ${(metric.value / maxValue * 100)}%"></div>
                    </div>
                </div>
            `).join('');
        }

        // Create radar charts
        function createRadarCharts() {
            // Destroy existing charts if they exist
            if (complaintChart) complaintChart.destroy();
            if (praiseChart) praiseChart.destroy();

            // Complaint Chart
            const complaintCtx = document.getElementById('complaintChart').getContext('2d');
            complaintChart = new Chart(complaintCtx, {
                type: 'radar',
                data: {
                    labels: ['Noise', 'Cleanliness', 'Location', 'Amenities', 'Host', 'Value'],
                    datasets: [{
                        label: 'Complaint Level',
                        data: [
                            parseFloat(selectedHotel.complaint_noise || 0),
                            parseFloat(selectedHotel.complaint_cleanliness || 0),
                            parseFloat(selectedHotel.complaint_location || 0),
                            parseFloat(selectedHotel.complaint_amenities || 0),
                            parseFloat(selectedHotel.complaint_host || 0),
                            parseFloat(selectedHotel.complaint_value || 0)
                        ],
                        backgroundColor: 'rgba(239, 68, 68, 0.2)',
                        borderColor: 'rgba(239, 68, 68, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(239, 68, 68, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(239, 68, 68, 1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 1,
                    scales: {
                        r: {
                            beginAtZero: true,
                            ticks: {
                                display: true
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });

            // Praise Chart
            const praiseCtx = document.getElementById('praiseChart').getContext('2d');
            praiseChart = new Chart(praiseCtx, {
                type: 'radar',
                data: {
                    labels: ['Quiet', 'Clean', 'Location', 'Amenities', 'Host', 'Value'],
                    datasets: [{
                        label: 'Praise Level',
                        data: [
                            parseFloat(selectedHotel.praise_quiet || 0),
                            parseFloat(selectedHotel.praise_clean || 0),
                            parseFloat(selectedHotel.praise_location || 0),
                            parseFloat(selectedHotel.praise_amenities || 0),
                            parseFloat(selectedHotel.praise_host || 0),
                            parseFloat(selectedHotel.praise_value || 0)
                        ],
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderColor: 'rgba(16, 185, 129, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(16, 185, 129, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(16, 185, 129, 1)'
                    }]
                },
                options: {
                    responsive: true,
                    aspectRatio: 1,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            ticks: {
                                display: true
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>

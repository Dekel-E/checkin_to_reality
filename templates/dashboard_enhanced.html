<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Intelligence Dashboard - Check-in to Reality</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Enhanced Filter Sidebar -->
        <div class="filter-sidebar">
            <div class="sidebar-header">
                <h3>
                    <i class="fas fa-filter"></i>
                    Hotels map
                </h3>
                <div class="subtitle">No surprises , get what you expect</div>
            </div>

            <div class="sidebar-content">
                <!-- Statistics Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="total-hotels">0</div>
                        <div class="stat-label">Hotels Found</div>
                    </div>
                    <div class="stat-card gradient-2">
                        <div class="stat-value" id="cities-count">0</div>
                        <div class="stat-label">Cities Available</div>
                    </div>
                </div>

                <!-- Search by Hotel Name -->
                <div class="search-input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="hotel-search" placeholder="Search hotel by name...">
                </div>

                <!-- City Filter -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-map-marker-alt"></i>
                        Location
                    </div>
                    <select class="form-select" id="city-filter">
                        <option value="">All Cities</option>
                    </select>
                </div>

                <!-- Review Score Filter -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-star"></i>
                        Review Score
                    </div>
                    <div class="range-slider-container">
                        <div class="range-values">
                            <span class="range-value" id="review-min-value">7.0</span>
                            <span class="range-value" id="review-max-value">10.0</span>
                        </div>
                        <input type="range" class="form-range" min="0" max="10" step="0.5" value="7" id="review-min">
                        <input type="range" class="form-range" min="0" max="10" step="0.5" value="10" id="review-max">
                    </div>
                </div>

                <!-- Number of Reviews Filter -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-comments"></i>
                        Minimum Reviews
                    </div>
                    <div class="range-slider-container">
                        <div class="range-values">
                            <span class="range-value" id="min-reviews-value">0</span>
                        </div>
                        <input type="range" class="form-range" min="0" max="500" step="10" value="0" id="min-reviews">
                    </div>
                </div>

                <!-- Gap Score Filter -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-chart-line"></i>
                        Reality Check Score
                    </div>
                    <div class="form-check">
                        <input class="form-check-input gap-filter" type="checkbox" value="Much Better Than Expected" id="gap-much-better" checked>
                        <label class="form-check-label" for="gap-much-better">
                            <i class="fas fa-star text-success"></i> Much Better Than Expected
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input gap-filter" type="checkbox" value="Better Than Expected" id="gap-better" checked>
                        <label class="form-check-label" for="gap-better">
                            <i class="fas fa-thumbs-up text-success"></i> Better Than Expected
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input gap-filter" type="checkbox" value="As Expected" id="gap-expected" checked>
                        <label class="form-check-label" for="gap-expected">
                            <i class="fas fa-check text-info"></i> As Expected
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input gap-filter" type="checkbox" value="Medium Risk" id="gap-medium" checked>
                        <label class="form-check-label" for="gap-medium">
                            <i class="bi bi-hand-thumbs-up-fill"></i> Medium Risk
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input gap-filter" type="checkbox" value="High Risk - Likely to Disappoint" id="gap-high">
                        <label class="form-check-label" for="gap-high">
                            <i class="fas fa-times-circle text-danger"></i> High Risk - Likely to Disappoint
                        </label>
                    </div>
                </div>

                <!-- Distance Filter -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-route"></i>
                        Distance from Center
                    </div>
                    <div class="range-slider-container">
                        <div class="range-values">
                            <span>Max: <span class="range-value" id="distance-value">20</span> km</span>
                        </div>
                        <input type="range" class="form-range" min="1" max="50" value="20" id="distance-filter">
                    </div>
                </div>

                <!-- Amenities Filter -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-concierge-bell"></i>
                        Required Amenities
                    </div>
                    <div class="form-check">
                        <input class="form-check-input amenity-filter" type="checkbox" value="has_wifi" id="wifi">
                        <label class="form-check-label" for="wifi">
                            <i class="fas fa-wifi"></i> WiFi
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input amenity-filter" type="checkbox" value="has_parking" id="parking">
                        <label class="form-check-label" for="parking">
                            <i class="fas fa-parking"></i> Parking
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input amenity-filter" type="checkbox" value="has_pool" id="pool">
                        <label class="form-check-label" for="pool">
                            <i class="fas fa-swimming-pool"></i> Pool
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input amenity-filter" type="checkbox" value="has_gym" id="gym">
                        <label class="form-check-label" for="gym">
                            <i class="fas fa-dumbbell"></i> Gym
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input amenity-filter" type="checkbox" value="has_breakfast" id="breakfast">
                        <label class="form-check-label" for="breakfast">
                            <i class="fas fa-coffee"></i> Breakfast
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input amenity-filter" type="checkbox" value="has_ac" id="ac">
                        <label class="form-check-label" for="ac">
                            <i class="fas fa-snowflake"></i> Air Conditioning
                        </label>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn-primary-custom" id="apply-filters">
                        <i class="fas fa-search"></i> Apply Filters
                    </button>
                    <button class="btn-secondary-custom" id="reset-filters">
                        <i class="fas fa-redo"></i> Reset All
                    </button>
                </div>
            </div>
        </div>

        <!-- Map Container -->
        <div class="map-container">
            <div id="map"></div>
            <div class="loading-overlay hidden" id="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading hotels...</div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard_enhanced.js') }}"></script>
</body>
</html>
